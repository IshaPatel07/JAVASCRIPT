<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quize!!</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body style="height: 100vh">
    <section class="p-2">
      <div class="container quize-container">
        <h2 class="text-center fs-1 fw-bold text-white">Complete All Queiz</h2>
        <div class="text-center">
          <span class="text-center fs-4 text-danger-emphasis fw-bold"
            >Time left :</span
          >
          <span id="timer" class="fs-2 fw-bold text-danger">0</span>
        </div>
        <hr class="my-4" />
        <div
          class="d-flex justify-content-center align-items-center flex-column"
        >
          <div class="col-8">
            <div class="mb-4">
              <span id="question-index" class="fs-3 fw-bolder">Q.1</span>
              <p id="questions" class="fs-3 fw-bolder">
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Minus
                illum eaque ratione. Veniam, similique tempore.
              </p>
            </div>
            <div> 
              <div id="opt-box-A" class="op">
                <span>A : </span>
                <span id="option-A"> Lorem ipsum dolor sit amet.</span>
              </div>
              <div id="opt-box-B" class="op">
                <span>B :</span>
                <span id="option-B">Lorem ipsum dolor sit amet.</span>
              </div>
              <div id="opt-box-C" class="op">
                <span>C :</span>
                <span id="option-C">Lorem ipsum dolor sit amet.</span>
              </div>
              <div id="opt-box-D" class="op">
                <span>D :</span>
                <span id="option-D">Lorem ipsum dolor sit amet.</span>
              </div>
            </div>
            <div class="my-3 text-center">
              <button id="next-button" class="sub-btn">next-></button>
            </div>
            <div class="scor">
              <h2 id="score-dis"></h2>
              <h2 id="pass-fail"></h2>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
