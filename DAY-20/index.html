<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body style="background-color: #bca2d6">
    <div
      style="
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-size: 30px;
      "
    >
      <h1 id="count" style="color: #6710c2; font-size: 60px;">0</h1>
      <button
        style="height: 30px; width: 150px; margin: 10px; border-radius: 10px; background-color: #a6a6de;"
        id="button1"
      >
        ++
      </button>
      <button
        style="height: 30px; width: 150px; margin: 10px; border-radius: 10px; background-color: #ffc8c8;"
        id="button2"
      >
        --
      </button>
      <button
        style="height: 30px; width: 150px; margin: 10px; border-radius: 10px; background-color: #ebf4f5;"
        id="button3"
      >
        reset
      </button>
      <button
        style="height: 30px; width: 150px; margin: 10px; border-radius: 10px; background-color: #ea72ad;"
        id="button4"
      >
        *= 2
      </button>
      <button
        style="height: 30px; width: 150px; margin: 10px; border-radius: 10px; background-color: #f9655b;"
        id="button5"
      >
        /= 2
      </button>
      <button
        style="height: 30px; width: 150px; margin: 10px; border-radius: 10px; background-color: #cc575f;"
        id="button6"
      >
        %= 2
      </button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
