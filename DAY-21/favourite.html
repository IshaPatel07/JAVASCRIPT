<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>favrite quotes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body style="background: linear-gradient(#f8acff, #ffc8c8)">
    <div class="container">
      <div class="my-4">
        <h2>favourite quotes</h2>
      </div>
      <div
        id="fav-quote-div"
        class="py-3"
        style="background-color: rgb(216, 180, 250)"
      ></div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      const favdiv = document.getElementById("fav-quote-div");
      function displayfavquotes() {
        const quotes = JSON.parse(localStorage.getItem("favlist"));
        quotes.map((quote) => {
          const div = document.createElement("div");
          div.innerHTML = `<div class="shadow p-4 rounded m-3">
          <p class="fs-3">
           ${quote.quote}
          </p>
          <p>${quote.author}</p>
        </div>`;
          favdiv.appendChild(div);
        });
      }

      displayfavquotes();
    </script>
  </body>
</html>
