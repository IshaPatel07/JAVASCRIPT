<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="vh-100 w-100">
    <!-- input task and set priority -->
    <section class="container mb-5">
      <div class="py-5">
        <h2 class="text-center">Task Manager</h2>
      </div>
      <div class="d-flex justify-content-center gap-3 shadow p-3 rounded">
        <input
          id="input-task-text"
          type="text"
          placeholder="Enter your task..."
          class="w-50"
        />
        <select
          class="form-select w-25"
          aria-label="Select Priority..."
          name=""
          id="input-task-priority"
        >
          <option value="all">All</option>
          <option value="high">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <button class="btn btn-primary" id="input-add-button">Add task</button>
      </div>
    </section>
    <!-- filteretion and searching -->
    <section class="container">
      <div class="d-flex justify-content-center gap-3 shadow p-3 rounded">
        <input
          id="input-filter-text"
          type="text"
          placeholder="Search your task..."
          class="w-25"
        />
        <select
          class="form-select w-25"
          aria-label="Select Priority..."
          name=""
          id="inpurt-filter-priority"
        >
          <option value="all">All</option>
          <option value="high">High</option>
          <option value="Medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select
          class="form-select w-25"
          aria-label="Select Status..."
          name=""
          id="input-filter-status"
        >
          <option value="all">All</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
        </select>
        <button id="input-filter-button" class="btn btn-primary w-25">
          Filter
        </button>
      </div>
    </section>
    <!-- task view, edit, delete and status change  -->
    <section class="container">
      <div
        id="task-display-box"
        class="w-100 d-flex flex-column align-items-center"
      >
        <div
          id="task-box"
          class="w-75 d-flex justify-content-between m-3 shadow p-3 rounded"
        >
          <div class="w-50">Lorem ipsum dolor sit amet.</div>
          <div class="w-25 d-flex gap-2">
            <button class="btn btn-warning">Edit</button>
            <button class="btn btn-danger">Delete</button>
            <button class="btn btn-success">Completed</button>
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
