<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>task manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-4">
      <h2 class="text-center mb-4">task manager</h2>

      <div class="card p-3 mb-4">
        <h5>Add task </h5>

        <div class="row g-3">
          <div class="col-md-3">
            <input
              type="text"
              id="title"
              class="form-control"
              placeholder=" Title"
            />
          </div>

          <div class="col-md-4">
            <input
              type="text"
              id="price"
              class="form-control"
              placeholder="discription"
            />
          </div>

          <div class="col-md-1">
            <input
              type="text"
              id="date"
              class="form-control"
              placeholder="date"
            />
          </div>

          <div class="col-md-2">
            <select id="category" class="form-select">
              <option value="">low</option>
              <option value="Electronics">medium</option>
              <option value="Fashion">High</option>
            </select>
          </div>

          <div class="col-md-2">
            <button class="btn btn-outline-success w-100" onclick="add_pkt()">
              Save
            </button>
          </div>
        </div>
      </div>

     
       <div class="row mb-3 g-2">
        <div class="col-md-4">
          <input
            type="text"
            id="search"
            class="form-control"
            placeholder="Search by title"
            onkeyup="applyFilters()"
          />
        </div>

        <div class="col-md-4">
          <select
            class="form-select"
            id="filterCategory"
            onchange="applyFilters()"
          >
            <option value="">Filter by Category</option>
            <option value="Electronics">title</option>
            <option value="Fashion">desc</option>
            <option value="Books">date</option>
          </select>
        </div>
      </div>

      
      <table class="table table-bordered table-striped text-center">
        <thead class="table-dark">
          <tr>
            <th>Title</th>
            <th>description</th>
            <th>date</th>
            <th>flow</th>
          </tr>
        </thead>
        <tbody id="productList"></tbody>
      </table>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
